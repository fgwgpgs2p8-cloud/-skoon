body {
    margin:0;
    font-family:Arial;
    min-height:100vh;

    justify-content:center;

/* ===== الكارد ===== */
.card{
    position:relative;
    background:rgba(255, 255, 255, 0.65);
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0, 0, 0, 0);

/* ===== الشير ===== */
.share{
    position:absolute;
    top:15px;
    left:15px;
    background:#f3f3f3;
    width:35px;
    height:35px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
}

.share:hover{
    background:rgb(15, 78, 156,0.386);
    color:white;
}
.logo{
    width:120px;
    height:120px;

    border-radius:50%;
    overflow:hidden;

    margin:0 auto 20px;

    border:2px solid rgba(255,255,255,0.8);

    box-shadow:0 8px 20px rgba(0,0,0,0.15);

    transition:0.3s ease;
}

/* الصورة داخل الشعار */
.logo img{
    width:100%;
    height:98%;

    object-fit:cover;

    object-position:55% 0.50%;

    transform:scale(1.30);

    transition:0.3s ease;
}
/* حركة خفيفة */
.logo:hover img{
    transform:scale(1.39);
}




/* ===== النص ===== */

a{

    position:relative;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    background:#f3f3f3;
    color:#333;
    font-weight:bold;
    transition:0.3s;
}

a i{
    position:absolute;
    left:15px;
    font-size:18px;
}

/* النص بالنص */
a span{
    width:100%;
    text-align:center;
}

/* hover */
a:hover{
    background:#698aba;
    color:white;
}

/* ===== الجوال ===== */
